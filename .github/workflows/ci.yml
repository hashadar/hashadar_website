# CI only: lint, typecheck, tests, build. Deploy stays on AWS Amplify (amplify.yml).
# Pin app Node via .nvmrc (kept in sync with Amplify amplify.yml); see docs/CI-AND-DEPLOYMENT.md.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      # v5+ uses Node 24 for the action runtime (avoids runner deprecation of Node 20 for actions).
      - uses: actions/checkout@v5

      - name: Use Node.js (same as .nvmrc / Amplify)
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
